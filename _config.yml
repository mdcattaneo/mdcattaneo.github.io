title: "Matias D. Cattaneo"
description: "Matias D. Cattaneo is a Professor of Operations Research and Financial Engineering at Princeton University whose research spans econometrics, statistics, machine learning, artificial intelligence, and causal inference."
url: "https://mdcattaneo.github.io"
baseurl: ""
markdown: kramdown
permalink: ":basename:output_ext"
theme: null

plugins:
  - jekyll-feed
  - jekyll-redirect-from

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - Dockerfile
  - environment.yml
  - scripts/
  - .github/
  - .vscode/
  - .DS_Store
  - .gitignore
  - .gitattributes
  - venv/
  - test_visual_comparison.py
  - requirements.txt
  - run_tests_simple.sh
  - test_results/
  - .pytest_cache/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
